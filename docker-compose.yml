version: "3.9"

services:
  app:
    build: .
    container_name: soundforears-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # DATABASE_URL comes from .env and should point to your external DB.
      NODE_ENV: production
    ports:
      # HostPort:ContainerPort – change host port if needed
      - "3001:3000"

